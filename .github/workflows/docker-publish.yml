name: publish to ghcr

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Fetch the latest version
        id: fetch_version
        run: |
          # Fetch the latest release version number from GitHub API
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/0xHashRaptor/ForgeMiner/releases/latest)
          VERSION=$(echo "$LATEST_RELEASE" | jq -r '.tag_name | ltrimstr("v")')
          echo "Fetched version: $VERSION"

          # Output the version and set it as an environment variable
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/dablincx/forgeminer-docker:${{ steps.fetch_version.outputs.version }}
            ghcr.io/dablincx/forgeminer-docker:${{ steps.fetch_version.outputs.version }}-${{ github.run_number }}
            ghcr.io/dablincx/forgeminer-docker:${{ github.sha }}
            ghcr.io/dablincx/forgeminer-docker:latest
          build-args: |
            VERSION=${{ steps.fetch_version.outputs.version }}
